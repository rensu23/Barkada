<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barkada Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="wrapper">
  <div class="dashboard-box">

    <!-- HEADER -->
    <div class="header">
      <h1>Barkada</h1>

      <div class="header-right">
        <button onclick="editProfile()">✏️</button>
        <button onclick="showAvatar()">🖼️</button>
        <button onclick="showAchievements()">🏆</button>
        <button onclick="showHistory()">📊</button>
        <div class="profile"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- TRIP -->
    <div class="trip-select">
      <span>" Boracay Trip "</span>
      <span>▼</span>
    </div>

    <!-- PROGRESS CARD -->
    <div class="card">
      <div class="progress-bar">
        <div class="progress"></div>
      </div>

      <p id="progressText">0%</p>
      <p>₱7,000 / ₱10,000</p>
      <p>Deadline: March 30</p>
    </div>

    <!-- STATUS -->
    <div class="status-box">
      <div class="status-header">
        <span>Your Status</span>
        <span>(i)</span>
      </div>
      <p class="badge paid">✔ Paid</p>
    </div>

    <div class="divider"></div>

    <!-- MEMBERS -->
    <div class="members-section">

      <div class="members-header">
        <h2>Members</h2>

        <select class="filter" onchange="filterMembers(this.value)">
          <option value="all">All</option>
          <option value="paid">Paid</option>
          <option value="pending">Pending</option>
          <option value="notpaid">Not Paid</option>
        </select>
      </div>

      <div id="memberList"></div>

    </div>

    <!-- LEGEND -->
    <div class="legend">
      <span>✔ Paid</span>
      <span>⏳ Pending</span>
      <span>❌ Not Paid</span>
    </div>

  </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
