<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Details | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="group-details">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="page-header page-section">
          <div class="page-header-copy">
            <p class="eyebrow">Group detail</p>
            <h1 data-group-title>Loading group...</h1>
            <p class="helper-text" data-group-description>Pulling mock details from the local demo state.</p>
          </div>
          <div class="header-actions">
            <a class="button-secondary" href="./edit-group.html?group_id=101">Edit group</a>
            <a class="button" href="./group-qr.html">View group QR</a>
          </div>
        </section>
        <section class="grid-2 page-section">
          <article class="card">
            <h2>Group summary</h2>
            <div class="detail-list space-top" data-group-meta></div>
          </article>
          <article class="card">
            <h2>Share tools</h2>
            <div class="detail-list space-top">
              <div class="summary-row"><span>Join link</span><strong>https://barkada.app/join/BORA101</strong></div>
              <div class="summary-row"><span>Copy action</span><strong>UI ready for clipboard hook</strong></div>
              <div class="summary-row"><span>Share button</span><strong>Use Web Share API or PHP-generated links later</strong></div>
            </div>
          </article>
        </section>
        <section class="grid-2 page-section">
          <article class="table-card">
            <h2>Contributions</h2>
            <div class="surface-list space-top" data-group-contributions></div>
          </article>
          <article class="table-card">
            <h2>Members</h2>
            <div class="surface-list space-top" data-group-members></div>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js"></script>
</body>
</html>
