<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="history">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="page-header page-section">
          <div class="page-header-copy">
            <p class="eyebrow">History</p>
            <h1>Payment history</h1>
            <p class="helper-text">Review status changes, marked times, and confirmed outcomes in one place.</p>
          </div>
        </section>
        <section class="table-card page-section">
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Contribution</th><th>Group</th><th>Amount</th><th>Status</th><th>Latest update</th></tr>
              </thead>
              <tbody data-history-table></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js"></script>
</body>
</html>
