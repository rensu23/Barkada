<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member QR | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="member-qr">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="page-section">
          <article class="qr-card">
            <p class="eyebrow">Personal QR</p>
            <h1 data-qr-title>Loading member QR...</h1>
            <div class="qr-placeholder space-top"></div>
            <div class="detail-list space-top">
              <div class="summary-row"><span>Member code</span><strong data-qr-code>MEM-0000</strong></div>
              <div class="summary-row"><span>Use case</span><strong data-qr-hint>Quick identity check for treasurers.</strong></div>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js"></script>
</body>
</html>
