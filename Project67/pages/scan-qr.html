<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan QR | Barkada</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem("barkada-theme")||"light";</script>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="app-shell" data-app-page="scan-qr">
  <div class="app-layout">
    <aside class="app-sidebar" data-sidebar></aside>
    <div class="app-main">
      <header class="app-topbar" data-topbar></header>
      <nav class="mobile-bottom-nav" data-bottom-nav></nav>
      <main class="page-content">
        <section class="grid-2 page-section">
          <article class="qr-card">
            <p class="eyebrow">Scanner placeholder</p>
            <h1>Scan a QR code</h1>
            <p class="helper-text">Real camera access can be attached later with a lightweight QR library.</p>
            <div class="qr-placeholder space-top"></div>
          </article>
          <article class="card">
            <form class="stack" data-code-form>
              <div class="field-group">
                <label for="scan-code">Manual code entry</label>
                <input id="scan-code" name="code" type="text" placeholder="Enter group or member code">
              </div>
              <button class="button" type="submit">Validate code shell</button>
              <article class="callout hidden" data-scan-result></article>
              <article class="callout"><span>Backend note</span><p class="helper-text">The PHP scan handler can later decide whether the code belongs to a group join flow or a member confirmation flow.</p></article>
            </form>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../js/main.js"></script>
</body>
</html>
